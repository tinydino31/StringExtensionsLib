trigger:
- main

pool:
  name: Default

variables:
  buildConfiguration: 'Release'

steps:

- task: UseDotNet@2
  displayName: 'Install .NET 8'
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore
  displayName: 'Restore packages'

- script: dotnet build --configuration $(buildConfiguration) --no-restore
  displayName: 'Build project'

- script: dotnet pack --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)
  displayName: 'Pack NuGet package'

# DEBUG STEP - see what files got created
- script: dir "$(Build.ArtifactStagingDirectory)"
  displayName: 'List staging directory'

- task: NuGetAuthenticate@1
  displayName: 'Authenticate NuGet'

- script: dotnet nuget push "$(Build.ArtifactStagingDirectory)\*.nupkg" --source "https://pkgs.dev.azure.com/jkau1146/_packaging/jkau1146/nuget/v3/index.json" --api-key az
  displayName: 'Push NuGet package'